<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <h2>Marks Calculator</h2>

        <div class="input-group">
            <label for="math">Mathematics:</label>
            <input type="number" id="math" placeholder="Out of 100">
        </div>
        <div class="input-group">
            <label for="sci">Science:</label>
            <input type="number" id="sci" placeholder="Out of 100">
        </div>
        <div class="input-group">
            <label for="eng">English:</label>
            <input type="number" id="eng" placeholder="Out of 100">
        </div>

        <button onclick="calculateMarks()">Calculate Grade</button>

        <div id="output" class="result"></div>
    </div>

    <script>
        function calculateMarks() {
            // 1. Fetch values from inputs (default to 0 if empty)
            let math = parseFloat(document.getElementById('math').value) || 0;
            let sci = parseFloat(document.getElementById('sci').value) || 0;
            let eng = parseFloat(document.getElementById('eng').value) || 0;

            // 2. Calculate total and percentage
            let totalMarks = math + sci + eng;
            let percentage = (totalMarks / 300) * 100;

            // 3. Determine Grade using a standard scale
            let grade = 'F';
            if (percentage >= 90) grade = 'A+';
            else if (percentage >= 80) grade = 'A';
            else if (percentage >= 70) grade = 'B';
            else if (percentage >= 60) grade = 'C';
            else if (percentage >= 50) grade = 'D';

            // 4. Display the formatted result
            document.getElementById('output').innerHTML =
                `Total Marks: ${totalMarks} / 300 <br>` +
                `Percentage: ${percentage.toFixed(2)}% <br>` +
                `Grade: ${grade}`;
        }
    </script>

</body>

</html>
